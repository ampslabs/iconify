name: iconify_sdk_builder
resolution: workspace
description: >
  Code generator and build_runner builder for Iconify SDK. Generates type-safe
  Dart constants for icon sets defined in iconify.yaml.
version: 0.1.0
repository: https://github.com/ampslabs/iconify_sdk/tree/main/packages/iconify_sdk_builder
issue_tracker: https://github.com/ampslabs/iconify_sdk/issues
homepage: https://github.com/ampslabs/iconify_sdk

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  build: ^2.4.1
  source_gen: ^1.5.0
  iconify_sdk_core: ^0.1.0

dev_dependencies:
  build_runner: ^2.4.8
  build_test: ^2.2.3
  lints: ^6.1.0
  test: any
