name: iconify_sdk
resolution: workspace
description: >
  The official Flutter package for Iconify icons. Render any icon from 200+
  open-source icon sets with a single widget. Works offline with bundled starter registry.
version: 0.1.0
repository: https://github.com/ampslabs/iconify_sdk/tree/main/packages/iconify_sdk
issue_tracker: https://github.com/ampslabs/iconify_sdk/issues
homepage: https://github.com/ampslabs/iconify_sdk

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  iconify_sdk_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
