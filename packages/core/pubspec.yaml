name: iconify_sdk_core
resolution: workspace
description: >
  Pure Dart engine for Iconify icons. Provides models, providers, cache,
  alias resolution, and JSON parsing. No Flutter dependency required.
version: 1.0.0
repository: https://github.com/ampslabs/iconify/tree/main/packages/iconify_sdk_core
issue_tracker: https://github.com/ampslabs/iconify/issues
homepage: https://github.com/ampslabs/iconify

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  path: ^1.9.0
  http: ^1.2.0
  meta: ^1.15.0
  xml: ^6.5.0

dev_dependencies:
  coverage: ^1.15.0
  lints: ^6.1.0
  mocktail: ^1.0.4
  test: ^1.25.0
