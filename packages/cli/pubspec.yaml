name: iconify_sdk_cli
resolution: workspace
description: >
  Command-line tool for the Iconify SDK. Downloads icon sets and generates
  Dart code from your iconify.yaml configuration.
version: 0.2.0
repository: https://github.com/ampslabs/iconify/tree/main/packages/iconify_sdk_cli
issue_tracker: https://github.com/ampslabs/iconify/issues
homepage: https://github.com/ampslabs/iconify

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  args: ^2.5.0
  cli_util: ^0.4.1
  iconify_sdk_core: ^0.2.0
  iconify_sdk_builder: ^0.2.0
  http: ^1.2.0
  crypto: ^3.0.3
  path: ^1.9.0
  yaml: ^3.1.2
  archive: ^3.6.1
  io: ^1.0.3
  mason_logger: ^0.3.1
  glob: ^2.1.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
  mocktail: ^1.0.4

executables:
  iconify: iconify
