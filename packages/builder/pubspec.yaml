name: iconify_sdk_builder
resolution: workspace
description: >
  Code generator and build_runner builder for Iconify SDK. Generates type-safe
  Dart constants for icon sets defined in iconify.yaml.
version: 1.0.0
repository: https://github.com/ampslabs/iconify/tree/main/packages/iconify_sdk_builder
issue_tracker: https://github.com/ampslabs/iconify/issues
homepage: https://github.com/ampslabs/iconify

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  build: ^4.0.4
  source_gen: ^4.2.0
  iconify_sdk_core: ^0.2.0
  yaml: ^3.1.2
  analyzer: ^10.0.1
  glob: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.12.2
  build_test: ^3.5.10
  lints: ^6.1.0
  test: ^1.25.0
