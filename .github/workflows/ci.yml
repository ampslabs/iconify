name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.sdk }}

      - name: Install Melos
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        # Run per-package so each package's analysis_options.yaml can resolve
        # package:lints/recommended.yaml via its own package config.
        run: melos exec -- "dart format --output=none --set-exit-if-changed ."

      - name: Analyze project
        run: |
          melos exec --no-flutter -- "dart analyze --fatal-infos"
          melos exec --flutter -- "flutter analyze --fatal-infos"

      - name: Run tests
        run: |
          # Run pure Dart tests
          melos exec --dir-exists=test --no-flutter -- "dart test"
          # Run Flutter tests
          melos exec --dir-exists=test --flutter -- "flutter test"

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts-${{ matrix.sdk }}
          path: "**/failures/"
          retention-days: 4