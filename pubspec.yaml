name: iconify_sdk_workspace
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'

workspace:
  - packages/core
  - packages/sdk
  - packages/builder
  - packages/cli
  - examples/gallery

# Melos configuration
# Melos is used for monorepo management (versioning, publishing, and scripts)
# while Dart Workspaces handle dependency resolution.
melos:
  name: iconify_sdk
  packages:
    - packages/*
  scripts:
    test:
      run: melos exec --dir-exists="test" -- "flutter test || dart test"
      description: "Run tests for all packages."

dev_dependencies:
  melos: ^7.4.0
  lints: any
dependency_overrides: {}
