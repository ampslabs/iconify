name: basic_example
description: A basic example of using iconify_sdk.
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  iconify_sdk:
    path: ../../packages/sdk
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
