name: basic_example
description: A basic example of using iconify_sdk.
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  iconify_sdk:
    path: ../../packages/sdk
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/iconify/used_icons.json.gz
    - assets/iconify/mdi.iconbin.gz
    - assets/iconify/lucide.iconbin.gz
    - assets/iconify/fa6-solid.iconbin.gz
    - assets/iconify/icons.sprite.svg.gz
    - assets/iconify/icons.sprite.json.gz
    - assets/iconify/icons.font.json.gz
    - assets/iconify/icons.font.otf.gz
